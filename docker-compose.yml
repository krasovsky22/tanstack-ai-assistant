services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tanstack_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      # Required for Docker MCP toolkit (weather, filesystem tools)
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker:/root/.docker:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPEN_WEATHER_API: ${OPEN_WEATHER_API:-}
      NEWS_API_TOKEN: ${NEWS_API_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      - postgres
      - ui
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    depends_on:
      - postgres
      - ui
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      - postgres
      - ui
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    depends_on:
      - postgres
      - elasticsearch
    ports:
      - "3000:3000"
    volumes:
      # Required for Docker MCP toolkit (weather, filesystem tools)
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker:/root/.docker:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      - postgres
      - ui
      - elasticsearch
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    depends_on:
      - postgres
      - ui
      - elasticsearch
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      - postgres
      - ui
      - elasticsearch
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:

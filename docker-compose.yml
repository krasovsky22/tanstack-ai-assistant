services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tanstack_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    depends_on:
      - postgres
      - elasticsearch
    ports:
      - "3000:3000"
    volumes:
      # Required for Docker MCP toolkit (weather, filesystem tools)
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker:/root/.docker:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ANALYSIS_MODEL: ${OPENAI_ANALYSIS_MODEL:-}
      OPEN_WEATHER_API: ${OPEN_WEATHER_API:-}
      NEWS_API_TOKEN: ${NEWS_API_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET}
      YAHOO_IMAP_USER: ${YAHOO_IMAP_USER:-}
      YAHOO_IMAP_PASSWORD: ${YAHOO_IMAP_PASSWORD:-}
      YAHOO_MAIL_FOLDERS: ${YAHOO_MAIL_FOLDERS:-INBOX}
      YAHOO_MAIL_MAX_EMAILS: ${YAHOO_MAIL_MAX_EMAILS:-50}
      ZAPIER_MCP_URL: ${ZAPIER_MCP_URL:-}
      ZAPIER_MCP_TOKEN: ${ZAPIER_MCP_TOKEN:-}
      DISABLE_TOOLS: ${DISABLE_TOOLS:-}
      DISABLE_SECTIONS: ${DISABLE_SECTIONS:-}
      CHROME_EXECUTABLE_PATH: ${CHROME_EXECUTABLE_PATH:-}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      - postgres
      - ui
      - elasticsearch
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.jobs
    depends_on:
      - postgres
      - ui
      - elasticsearch
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROME_EXECUTABLE_PATH: ${CHROME_EXECUTABLE_PATH:-}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      - postgres
      - ui
      - elasticsearch
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-tanstack_ai}?sslmode=disable
      APP_URL: ${APP_URL:-http://ui:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:

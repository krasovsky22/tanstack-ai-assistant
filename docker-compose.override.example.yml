# Development override: volume mounts for hot reload
# Copy to docker-compose.override.yml:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Use: docker compose up
#
# Two UI dev modes (pick one):
#   A) UI in Docker  — hot reload via volume mounts (default below)
#   B) UI locally    — run `pnpm dev`, set worker APP_URL to http://host.docker.internal:3000

services:
  ui:
    build:
      target: dev
    volumes:
      # Required for Docker MCP toolkit (weather, filesystem tools)
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker:/root/.docker:ro
      # Source code — watched by Vite for hot reloading
      - ./src:/app/src
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./drizzle.config.ts:/app/drizzle.config.ts
      # Isolated node_modules from the image (avoids host conflicts)
      - ui_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    restart: "no"

  gateway:
    volumes:
      - ./workers/gateway:/app/workers/gateway
      - ./src:/app/src
      - ./.env:/app/.env
      - gateway_node_modules:/app/node_modules

  jobs:
    volumes:
      - ./workers/jobs:/app/workers/jobs
      - ./src:/app/src
      - ./.env:/app/.env
      - jobs_node_modules:/app/node_modules

  cron:
    volumes:
      - ./workers/cron:/app/workers/cron
      - ./src:/app/src
      - ./.env:/app/.env
      - cron_node_modules:/app/node_modules

volumes:
  ui_node_modules:
  gateway_node_modules:
  jobs_node_modules:
  cron_node_modules:

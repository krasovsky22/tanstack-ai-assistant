# Development override: volume mounts for hot reload, local UI
# Copy to docker-compose.override.yml for local development:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Use: docker compose up
# Run UI locally: pnpm dev (workers will call http://host.docker.internal:3000)

services:
  gateway:
    environment:
      APP_URL: http://host.docker.internal:3000
    volumes:
      - ./workers/gateway:/app/workers/gateway
      - ./src:/app/src
      - ./.env:/app/.env
      - gateway_node_modules:/app/node_modules

  jobs:
    environment:
      APP_URL: http://host.docker.internal:3000
    volumes:
      - ./workers/jobs:/app/workers/jobs
      - ./src:/app/src
      - ./.env:/app/.env
      - jobs_node_modules:/app/node_modules

  cron:
    environment:
      APP_URL: http://host.docker.internal:3000
    volumes:
      - ./workers/cron:/app/workers/cron
      - ./src:/app/src
      - ./.env:/app/.env
      - cron_node_modules:/app/node_modules

volumes:
  gateway_node_modules:
  jobs_node_modules:
  cron_node_modules:
